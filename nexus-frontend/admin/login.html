<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login · NExs</title>
  <link rel="stylesheet" href="/css/admin.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>

<body class="admin-body">
  <main class="admin-auth">
    <section class="auth-card">
      <div class="auth-brand">
        <span class="auth-mark">◆</span>
        <div>
          <h1>NExs Admin</h1>
          <p>Sign in to manage site content.</p>
        </div>
      </div>

      <form id="loginForm" class="auth-form" autocomplete="off">
        <label>
          <span>Username</span>
          <input name="username" placeholder="admin" required />
        </label>
        <label>
          <span>Password</span>
          <div style="display:flex; gap:10px; align-items:center">
            <input id="passwordInput" name="password" type="password" placeholder="admin123" required style="flex:1" />
            <button id="togglePassword" type="button" class="auth-btn" style="padding:10px 12px; width:auto">Show</button>
          </div>
        </label>
        <button type="submit" class="auth-btn">Login</button>
        <p class="auth-hint">Tip: Default credentials are <strong>admin</strong> / <strong>admin123</strong>.</p>
      </form>

      <p id="loginError" class="auth-error" hidden></p>
      <a class="auth-back" href="/">← Back to website</a>
    </section>
  </main>

  <script>
    function getApiBase() {
      try {
        const override = (window.NEXS_API_BASE || "").trim();
        if (override) return override.replace(/\/+$/, "");
      } catch { }
      const host = String(window.location && window.location.hostname ? window.location.hostname : "");
      if (host.endsWith("vercel.app")) return "https://nexs-hub-1.onrender.com";
      return "";
    }

    const API_BASE = getApiBase();
    function apiUrl(path) {
      return API_BASE ? API_BASE + path : path;
    }

    const form = document.getElementById("loginForm");
    const err = document.getElementById("loginError");
    const passwordInput = document.getElementById("passwordInput");
    const togglePassword = document.getElementById("togglePassword");

    if (togglePassword && passwordInput) {
      togglePassword.addEventListener("click", () => {
        const isHidden = passwordInput.type === "password";
        passwordInput.type = isHidden ? "text" : "password";
        togglePassword.textContent = isHidden ? "Hide" : "Show";
      });
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      err.hidden = true;

      const fd = new FormData(form);
      const body = new URLSearchParams(fd);

      const res = await fetch(apiUrl("/admin/login"), {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body,
        credentials: "include"
      });

      if (res.ok) {
        window.location.href = "/admin/dashboard";
        return;
      }

      let msg = "Login failed.";
      try {
        const j = await res.json();
        msg = j.message || msg;
      } catch { }
      err.textContent = msg;
      err.hidden = false;
    });
  </script>
</body>

</html>
